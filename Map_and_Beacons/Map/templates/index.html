<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indoor Positioning System</title>
    <style>
        .nav-links {
            margin: 15px 0;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 8px;
        }
        .nav-links a {
            margin-right: 15px;
            text-decoration: none;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border-radius: 4px;
        }
        .nav-links a:hover {
            background-color: #45a049;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .input-section {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        .map-container {
            position: relative;
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            overflow: hidden;
        }
        .beacon {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: blue;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .beacon-label {
            position: absolute;
            font-size: 12px;
            transform: translate(-50%, 10px);
        }
        .user-position {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .user-position::after {
            content: "You";
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        .beacon-circle {
            position: absolute;
            border: 1px dashed rgba(0, 0, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        input[type="text"] {
            padding: 8px;
            width: 250px;
            margin-right: 10px;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>    <div class="container">
        <h1>Indoor Positioning System</h1>
        
        <div class="nav-links">
            {% for link in nav_links %}
                <a href="{{ link.url }}">{{ link.text }}</a>
            {% endfor %}
        </div>
        
        <div class="input-section">
            <h2>Enter Your WiFi Hotspot Name</h2>
            <input type="text" id="hotspotInput" placeholder="Enter your WiFi hotspot name">
            <button id="startScanBtn">Start Scanning</button>
            <div id="statusMessage" class="status">Ready to scan</div>
        </div>
        
        <div class="map-section">
            <h2>Indoor Map</h2>
            <div class="map-container" id="map">
                <!-- Beacons and user position will be added here dynamically -->
            </div>
        </div>
        
        <div class="data-section">
            <h2>Beacon Data</h2>
            <table>
                <thead>
                    <tr>
                        <th>Beacon ID</th>
                        <th>RSSI (dBm)</th>
                        <th>Estimated Distance (m)</th>
                    </tr>
                </thead>
                <tbody id="beaconData">
                    <!-- Beacon data will be displayed here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Scale for visualization (pixels per meter)
        const SCALE = 40;
        const mapContainer = document.getElementById('map');
        const mapWidth = mapContainer.clientWidth;
        const mapHeight = mapContainer.clientHeight;
        
        // Center of the map
        const mapCenterX = mapWidth / 2;
        const mapCenterY = mapHeight / 2;
        
        let updateTimer;
        
        document.getElementById('startScanBtn').addEventListener('click', function() {
            const hotspotName = document.getElementById('hotspotInput').value.trim();
            if (!hotspotName) {
                alert('Please enter a WiFi hotspot name');
                return;
            }
            
            startScanning(hotspotName);
        });
        
        function startScanning(hotspotName) {
            // Send hotspot name to server
            fetch('/set_hotspot', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ hotspot_name: hotspotName }),
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('statusMessage').textContent = data.message;
                
                // Start polling for position updates
                if (updateTimer) clearInterval(updateTimer);
                updateTimer = setInterval(updatePosition, 2000);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('statusMessage').textContent = 'Error starting scan';
            });
        }
        
        function updatePosition() {
            fetch('/get_position')
            .then(response => response.json())
            .then(data => {
                renderMap(data);
                updateBeaconTable(data);
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }
        
        function renderMap(data) {
            // Clear previous elements
            const existingElements = document.querySelectorAll('.beacon, .beacon-label, .user-position, .beacon-circle');
            existingElements.forEach(el => el.remove());
            
            // Add beacons to the map
            for (const [beaconId, position] of Object.entries(data.beacons)) {
                // Convert logical coordinates to pixel coordinates
                const x = mapCenterX + position.x * SCALE;
                const y = mapCenterY - position.y * SCALE;  // Y is inverted in screen coordinates
                
                // Create beacon element
                const beacon = document.createElement('div');
                beacon.className = 'beacon';
                beacon.style.left = `${x}px`;
                beacon.style.top = `${y}px`;
                
                // Create beacon label
                const label = document.createElement('div');
                label.className = 'beacon-label';
                label.textContent = beaconId;
                label.style.left = `${x}px`;
                label.style.top = `${y}px`;
                
                // Add to map
                mapContainer.appendChild(beacon);
                mapContainer.appendChild(label);
                
                // If we have RSSI value for this beacon, draw a circle representing distance
                if (data.rssi_values[beaconId]) {
                    const rssi = data.rssi_values[beaconId];
                    // Convert RSSI to distance
                    const txPower = -45;
                    const n = 2.5;
                    const ratio = rssi / txPower;
                    let distance;
                    if (ratio < 1.0) {
                        distance = Math.pow(ratio, 10);
                    } else {
                        distance = Math.pow(10, (txPower - rssi) / (10 * n));
                    }
                    
                    // Create circle with radius proportional to distance
                    const circle = document.createElement('div');
                    circle.className = 'beacon-circle';
                    circle.style.left = `${x}px`;
                    circle.style.top = `${y}px`;
                    circle.style.width = `${distance * 2 * SCALE}px`;
                    circle.style.height = `${distance * 2 * SCALE}px`;
                    
                    mapContainer.appendChild(circle);
                }
            }
            
            // Add user position if available
            if (data.position && data.position.x !== null && data.position.y !== null) {
                const userX = mapCenterX + data.position.x * SCALE;
                const userY = mapCenterY - data.position.y * SCALE;
                
                const userMarker = document.createElement('div');
                userMarker.className = 'user-position';
                userMarker.style.left = `${userX}px`;
                userMarker.style.top = `${userY}px`;
                
                mapContainer.appendChild(userMarker);
                
                document.getElementById('statusMessage').textContent = 
                    `Position found: (${data.position.x.toFixed(2)}, ${data.position.y.toFixed(2)})`;
            }
        }
        
        function updateBeaconTable(data) {
            const tableBody = document.getElementById('beaconData');
            tableBody.innerHTML = '';
            
            for (const [beaconId, rssi] of Object.entries(data.rssi_values)) {
                if (beaconId in data.beacons) {
                    // Calculate distance
                    const txPower = -45;
                    const n = 2.5;
                    const ratio = rssi / txPower;
                    let distance;
                    if (ratio < 1.0) {
                        distance = Math.pow(ratio, 10);
                    } else {
                        distance = Math.pow(10, (txPower - rssi) / (10 * n));
                    }
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${beaconId}</td>
                        <td>${rssi} dBm</td>
                        <td>${distance.toFixed(2)} m</td>
                    `;
                    tableBody.appendChild(row);
                }
            }
        }
    </script>
</body>
</html>

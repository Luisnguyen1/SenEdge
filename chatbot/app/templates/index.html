<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/markdown.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>Trợ lý ảo SGTeam</h1>
            </div>
            <div class="header-controls">
                <button id="clear-chat" title="Clear chat"><i class="fas fa-trash-alt"></i></button>
                <button id="theme-toggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="message-content">
                    <div class="message-text">Xin chào! Tôi là chatbot của bạn. Tôi có thể giúp gì cho bạn hôm nay?</div>
                </div>
                <div class="message-time">{{ current_time }}</div>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Nhập câu hỏi của bạn..." rows="1"></textarea>
                <button id="send-button" title="Send message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-features">
                <button id="voice-input" title="Voice input"><i class="fas fa-microphone"></i></button>
                <button id="attachment" title="Add attachment"><i class="fas fa-paperclip"></i></button>
            </div>
        </div>
    </div>

    <div class="loading-indicator" id="loading-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
